name: E2E

# 에너지엑스 인사 평가 — Playwright E2E (planner/generator/healer 하네스의 동적 게이트)
# postgres 서비스 + 마이그레이션/시드 후, playwright webServer 가 api(:4000)·web(:3000) 를
# 직접 기동(CI=true → reuseExistingServer=false)하고 e2e 스위트를 실행한다.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: growthx
          POSTGRES_PASSWORD: growthx
          POSTGRES_DB: growthx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U growthx"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://growthx:growthx@localhost:5432/growthx?schema=public
      PORT: '4000'
      API_PROXY_TARGET: http://localhost:4000
      CHECKPOINT_DISABLE: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Prisma generate · migrate · seed
        working-directory: apps/api
        run: |
          pnpm exec prisma generate
          pnpm exec prisma migrate deploy
          pnpm exec ts-node prisma/seed.ts
          pnpm exec ts-node prisma/seed-test-data.ts

      - name: Install Playwright (chromium)
        run: pnpm -C e2e exec playwright install --with-deps chromium

      - name: Run E2E
        run: pnpm -C e2e test

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
