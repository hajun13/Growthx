# ─────────────────────────────────────────────────────────────
# GrowthX (KPI 시스템) 프로덕션 배포 — 맥, hr.energyx.co.kr, SSO 모드.
#
# 로컬 dev(docker-compose.yml)와 분리. 실행 (맥에서):
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
#
# 전제: EX-DB-API 의 Keycloak+Caddy 스택이 같은 맥에서 돌고 있고,
#       energyx-platform 네트워크가 존재한다 (docker network create energyx-platform).
#
# 보안 설계:
#   - 호스트에 노출되는 포트 없음. 인터넷은 EX-DB-API 의 Caddy(:443)가 받아
#     hr.energyx.co.kr → growthx-web:3000 으로 프록시한다.
#   - db(5432)는 내부만. api 도 호스트 미노출.
#   - 시크릿은 .env.prod 에서만.
# ─────────────────────────────────────────────────────────────
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # ⚠️ seed-data.sql 자동복원 안 함(프로덕션). 실 데이터는 pg_dump 로 이전(배포 가이드).
    # ⚠️ 호스트 포트 노출 없음.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      CHECKPOINT_DISABLE: "1"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      RUN_SEED: "false"
      # ── SSO ── 배포에선 issuer 는 공개 주소(토큰 iss 와 일치), jwks 는 내부 컨테이너.
      AUTH_MODE: ${AUTH_MODE:-sso}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-growthx-api}
      KEYCLOAK_AZP: ${KEYCLOAK_AZP:-growthx-web}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # ── 메일(SMTP) ── MailService 는 process.env 를 직접 읽는다. 여기서 통과시키지 않으면
      # .env.prod 를 채워도 컨테이너 안에서는 콘솔 폴백이라 중간점검 알림 메일이 나가지 않는다.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@energyx.co.kr}
      # 알림 메일 본문 링크의 절대 주소(예: https://hr.energyx.co.kr). 미설정이면 상대경로.
      APP_BASE_URL: ${APP_BASE_URL:-}
      # 안전장치: 설정 시 이 주소들로만 실발송(쉼표 구분). SMTP 켤 때 리허설용 — 미설정이면 전체 발송.
      MAIL_ALLOWLIST: ${MAIL_ALLOWLIST:-}
    networks:
      default: {}          # db
      energyx-platform:
        # keycloak JWKS 접근 + EX-DB-API 동기화 에이전트가 이 별칭으로 호출한다(Phase 2-B).
        # 별칭 없이는 공유 네트워크에서 서비스명 "api" 가 EX-DB-API 쪽 api 와 충돌한다.
        aliases:
          - growthx-api
    # 호스트 포트 노출 없음.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_PROXY_TARGET: http://api:3000
        # 브라우저가 직접 접속하는 Keycloak 주소 = 공개 주소.
        NEXT_PUBLIC_AUTH_MODE: ${NEXT_PUBLIC_AUTH_MODE:-sso}
        NEXT_PUBLIC_KEYCLOAK_AUTHORITY: ${NEXT_PUBLIC_KEYCLOAK_AUTHORITY}
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-growthx-web}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      API_PROXY_TARGET: http://api:3000
    networks:
      default: {}
      energyx-platform:
        # Caddy(EX-DB-API 스택)가 이 별칭으로 찾아 프록시한다.
        aliases:
          - growthx-web
    # 호스트 포트 노출 없음 — Caddy 가 energyx-platform 으로 growthx-web:3000 에 접근.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/login"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

networks:
  # EX-DB-API 프로덕션 스택과 공유. 없으면: docker network create energyx-platform
  energyx-platform:
    external: true

volumes:
  pgdata: {}
